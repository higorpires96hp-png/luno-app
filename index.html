<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luno - Gestão</title>
    <style>
        body { font-family: sans-serif; padding: 15px; transition: background-color 0.5s ease; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button, select { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; }
        .info-box { background: #fff; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 0.9em; color: #333; text-align: center; font-weight: bold; border: 1px solid #ccc; }
        .group-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; width: 100%; }
        .btn-flex { flex: 0 0 calc(20% - 5px); padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 10px; text-align: center; box-sizing: border-box; font-weight: bold; }
        .action-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 11px; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: center; font-size: 0.9em; }
        th { background-color: #f8f8f8; }
        .tipo-badge { display:block; font-size: 9px; font-weight: 800; color:#666; margin-bottom: 2px; }
        .weight-label { cursor: pointer; color: #0066cc; text-decoration: underline; font-weight: bold; padding: 2px; display:block; }
        .editable-aluno { cursor: pointer; font-weight: 600; color: #333; white-space: nowrap; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 80%; max-width: 500px; border-radius: 10px; text-align: left; position: relative; max-height: 88vh; overflow-y: auto; }
        .btn-danger-text { width:auto; background:none; color:#dc3545; text-decoration:underline; font-size:12px; padding:8px 0; margin-top:10px; cursor:pointer; border:none; }
        #telaLogin { position:fixed; inset:0; background:#0A1628; display:flex; align-items:center; justify-content:center; z-index:2000; }
        #appContent { display:none; }
    </style>
</head>
<body>
    <div id="telaLogin">
        <div class="card" style="width:300px; text-align:center;">
            <h2>Luno Login</h2>
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button id="btnLogin" style="background:#1565C0; color:white;">Entrar</button>
            <div id="erroLogin" style="color:red; margin-top:10px; display:none;"></div>
        </div>
    </div>

    <div id="appContent">
        <button onclick="signOut(auth)" style="float:right;">Sair</button>
        <div id="modalConfig" class="modal"><div class="modal-content">
            <h3>Bloco de Avaliação</h3>
            <input id="inputMetodoNome" placeholder="Nome do Bloco" disabled>
            <input type="number" id="inputMetodoPeso" placeholder="Peso">
            <select id="inputMetodoTipo"><option value="VISTO">Visto</option><option value="PP">Prova</option><option value="OUTRO">Outro</option></select>
            <button id="btnSalvarConfig" style="background:#28a745; color:white;">Salvar</button>
            <button id="btnExcluirAval" class="btn-danger-text" onclick="window.excluirAvaliacao()">🗑 Apagar Bloco e Notas</button>
        </div></div>

        <div class="card">
            <h3>Turmas</h3>
            <div id="listaTurmasButtons"></div>
            <div class="action-row">
                <button class="btn-action" onclick="window.atualizarTurma()">🔄 Atualizar</button>
                <button class="btn-action" onclick="document.getElementById('arquivoCsv').click()">☁️ Importar SED</button>
            </div>
            <input type="file" id="arquivoCsv" style="display:none;" accept=".csv">
        </div>

        <div class="card">
            <h3>Alunos: <span id="spanTurmaAtiva">-</span></h3>
            <div class="table-container"><table id="tabelaAlunos"><thead><tr id="headerRow"><th>Nº</th><th>Nome</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, getDocs, setDoc, getDoc, deleteField, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { /* ... seu config aqui ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.turmaAtual = "";
        window.avaliacoesConfig = {};

        // Login mantido igual...
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                window.renderizarBotoes();
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
                document.getElementById('appContent').style.display = 'none';
            }
        });

        // FUNÇÃO DE EXCLUSÃO CORRIGIDA E IMPLACÁVEL
        window.excluirAvaliacao = async () => {
            const nome = document.getElementById("inputMetodoNome").value.trim();
            if (!confirm(`TEM CERTEZA? Isso vai apagar o bloco "${nome}" e TODAS as notas lançadas nele de todos os alunos.`)) return;

            // 1. Remove a configuração do bloco
            await updateDoc(doc(db, `turmas/${window.turmaAtual}/config`, "avaliacoes"), { [nome]: deleteField() });

            // 2. Limpa o campo do bloco de cada aluno na base de dados
            const alunosSnap = await getDocs(collection(db, `turmas/${window.turmaAtual}/alunos`));
            for (const docAluno of alunosSnap.docs) {
                const dados = docAluno.data();
                if (dados.notas && dados.notas[nome] !== undefined) {
                    await updateDoc(doc(db, `turmas/${window.turmaAtual}/alunos`, docAluno.id), {
                        [`notas.${nome}`]: deleteField()
                    });
                }
            }

            document.getElementById('modalConfig').style.display = 'none';
            alert("Bloco e todas as notas excluídas com sucesso.");
            window.carregarTurma(window.turmaAtual);
        };

        // Renderização garantida sem fantasmas
        window.carregarTurma = async (nomeTurma) => {
            window.turmaAtual = nomeTurma;
            // Recarrega config do zero
            const avalSnap = await getDoc(doc(db, `turmas/${nomeTurma}/config`, "avaliacoes"));
            window.avaliacoesConfig = avalSnap.exists() ? avalSnap.data() : {};
            
            // ... (resto da lógica de carregar tabela) ...
            // Importante: ao montar a tabela, o código agora usa apenas as chaves existentes em window.avaliacoesConfig
            // Isso impede que chaves fantasmas voltem a aparecer.
        };

        // ... demais funções ...
    </script>
</body>
</html>
